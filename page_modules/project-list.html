<link rel="import" href="../bower_components/polymer/polymer.html">
<link rel="import" href="../bower_components/iron-icons/av-icons.html">
<link rel="import" href="project-item.html">
<dom-module id="project-list">
  
  <template>
    <style>
      :host{
        display: block;
        margin: 2rem 0;
      };
      h2 {
      text-align: center;
      }
      .prject_name{
        font-size: 1.5rem;
        font-weight: 800;
        margin: 0.5rem 0;
      }
      .authors{
        font-style: italic;
        margin: 0.5rem 0;
      }
      .descript {
        margin: 0.5rem 0;
      }
      a.demo{
        float: left;
        max-width: 200px;
        margin: 10px 25px;
        position: relative;
      }
      div.demo-title{
        text-align: center;
      }
      div.clear-float{
        clear: both;
      }
      div.demos{
        display: inline-block;
        margin: auto;
      }

    </style>
    <h2> Projects </h2>
    <template is="dom-repeat" items="{{projects}}">
        <project-item>
          <div class="prject_name">{{item.project_name}}</div>
          <div class="authors">{{item.authors}}</div>
          <div class="descript">{{item.descript}}</div>
          <div class="tags">
            <template is="dom-repeat" items="{{item.tags}}">
              <a href="{{item.url}}" class="text">{{item.text}}</a>
            </template>
          </div>
          <div class="demos">
            <template is="dom-repeat" items="{{item.demos}}">
              <a href="{{item.video}}" class="demo">
                <img src="{{item.image}}" class="demo-image"/>
                <div class="demo-title">{{item.title}}</div>
              </a>
            </template>
            <div class="clear-float"></div>
          </div>
        </project-item>
    </template>

  </template>

      }
    });
  </script>

</dom-module>
