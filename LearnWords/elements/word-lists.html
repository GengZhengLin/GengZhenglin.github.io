<script src="../bower_components/webcomponentsjs/webcomponents.min.js"></script>
<link href="../bower_components/core-animated-pages/core-animated-pages.html" rel="import">
<link href="../bower_components/paper-button/paper-button.html" rel="import">
<link href="../bower_components/paper-radio-group/paper-radio-group.html" rel="import">
<link rel="import" href="../bower_components/core-icons/core-icons.html">
<polymer-element name="word-lists">
  <template>

    <style>
      .list-container {
        position: absolute;
        top: 200px;
        right: 0;
        left: 0;
        text-align: center;
      }

      .list {
        display: inline-block;
        position: relative;
        border-radius: 3px;
        margin: 20px;
        overflow: hidden;
        text-align: start;
        background-color: #fff;
        cursor: pointer;
        box-shadow: 0 2px 10px 0 rgba(0, 0, 0, 0.16);
      }

      .list-top {
        width: 200px;
        height: 200px;
      }

      .list-bottom {
        padding: 8px;
        line-height: 1.5;
      }

      .list-name-title {
        font-weight: bold;
      }

      #details {
        padding: 100px 10% 0;
      }

      .list-info {
        height: 400px;
        border-radius: 3px;
        text-align: start;
        overflow: hidden;
        background: #fff;
        box-shadow: 0 6px 20px 0 rgba(0, 0, 0, 0.19);
      }

      .list-info-left {
        width: 400px;
      }

      .list-info-right {
        padding: 24px;
      }

      .list-info-icon {
        border-radius: 50%;
        width: 60px;
        height: 60px;
        margin-right: 16px;
      }

      .list-info-name-title {
        font-size: 2em;
      }
      .list-btn-container{
        height: 300px;
        width: 250px;
        margin: auto;
        overflow-y: auto;
      }
      .icons-container{
        height: 300px;
        overflow-y: auto;
      }

      .begin-btn{
        float: right;
        bottom: 50px;
        background: #4285f4;
        color: white;
      }

      @keyframes appear{
        0% {transform: scale(0); -webkit-transform: scale(0);}
        80% {transform: scale(1.2); -webkit-transform: scale(1.2);}
        100% {transform: scale(1); -webkit-transform: scale(1);}
      }
      .container-appear{
        animation-name: appear;
        animation-duration: 0.5s;
      }

      @keyframes disappear{
        0% {transform: scale(1); -webkit-transform: scale(1);}
        20% {transform: scale(1.2); -webkit-transform: scale(1.2);}
        100% {transform: scale(0); -webkit-transform: scale(0);}
      }
      .container-disappear{
        animation-name: disappear;
        animation-duration: 0.5s;
        transform: scale(0);
        -webkit-transform: scale(0);
      }

/*      .container-appear{
        -webkit-transform: translateY(0);
        transform: translateY(0);
        -webkit-transition: -webkit-transform 0.5s ease-out;
        transition: transform 0.5s ease-out;
      }

      .container-disappear{
        -webkit-transform: translateY(300px);
        transform: translateY(300px);
        -webkit-transition: -webkit-transform 0.5s ease-out;
        transition: transform 0.5s ease-out;
      }*/

      ::content .list-btn{
        width: 150px;
        margin-bottom: 10px;
        background: white;
        color: black;
        
      }
      ::content .list-btn[active]{
        background: #4285f4;
        color: white;
      }
      ::content .icon-vis{
        margin: 12px;
        height: 18px;
        cursor: pointer;
      }
      ::content .icon-selected{
        color: #4285f4;
      }
      ::content .icon-unselected{
        color: #BDBDBD;
      }
      .radio-grp{
        margin-left: 100px;
      }

      .list-GRE3000{
        background:#f4db33;
      }

      .list-Japanese{
        background:#7dd6fe;
      }

      .list-LocalFile{
        background:#dc3c84;
      }
      
    </style>

    <core-animated-pages selected="{{page}}" transitions="hero-transition" on-core-animated-pages-transition-end="{{complete}}">

      <section>

        <div class="list-container">
          <div class="list" hero-id="GRE3000-id" id="GRE3000" hero>
            <div class="list-top list-GRE3000" hero-id="GRE3000-block" hero></div>
            <div class="list-bottom">
              <div class="list-name-title">GRE要你命3000</div>
            </div>
          </div>

          <div class="list" hero-id="Japanese-id" id="Japanese">
            <div class="list-top list-Japanese" hero-id="Japanese-block"></div>
            <div class="list-bottom">
              <div class="list-name-title">新文化日本语教程</div>
            </div>
          </div>

          <div class="list" hero-id="LocalFile-id">
            <div class="list-top list-LocalFile" hero-id="LocalFile-block"></div>
            <div class="list-bottom">
              <div class="list-name-title">选择本地文件(施工中...)</div>
            </div>
          </div>

        </div>
      </section>

      <section id="details">

        <div class="list-info" layout horizontal hero-id="GRE3000-id" hero>
          <div class="list-info-left" style="/*background:#f4db33;*/" hero-id="GRE3000-block" hero></div>
          <div class="list-info-right" flex>
            <div layout horizontal center>
              <div>
                <div class="list-info-icon" style="/*background:#f4db33;*/"></div>
              </div>
              <div flex>
                <div class="list-info-name-title">GRE要你命3000</div>
              </div>
            </div>
            <div layout horizontal center>
              <div layout vertical center class="list-btn-container">
                <content select="paper-button"></content>
              </div>
              <paper-radio-group selected="small" layout vertical class="list-btn-container radio-grp">
                <content select="paper-radio-button"></content>
              </paper-radio-group>
              <div layout vertical center class="icons-container">
                <content select="core-icon"></content>
              </div>

            </div>
            <paper-button raised affirmative class="begin-btn">开始</paper-button>
          </div>

        </div>
        

      </section>

    </core-animated-pages>

  </template>
  
  <script>

    Polymer('word-lists', {

      page: 0,

      items: [
        { id: 'GRE3000', name: 'GRE要你命3000', color: '#f4db33' },
        { id: 'Japanese', name: '新世纪文化日本语', color: '#7dd6fe' },
        { id: 'LocalFile', name: '选择本地文件', color: '#dc3c84' }
      ],

      selectedname: null,

      transition: function(e) {
        if (this.page === 0) {
          this.page = 1;
        } else {
          this.page = 0;
        }
      }
    });

  </script>
</polymer-element>
