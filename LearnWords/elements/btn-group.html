<link rel="import" href="../bower_components/polymer/polymer.html">
<polymer-element name="btn-group">
  <template>
    <style>
      :host{
        margin: auto;
        display: table;
        position: relative;
      }
      ::content .fab {
        position: relative;
        display: inline-block;
        width: 56px;
        height: 56px;
        margin: 15px;
        border-radius: 50%;
        color: #fff;
        overflow: hidden;
        transition: box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        transition-delay: 0.2s;
        box-shadow: 0 2px 5px 0 rgba(0, 0, 0, 0.26);
        cursor: pointer;
      }
      
      ::content .fab.back {
        background-color: #d23f31;
      }

      ::content .fab.wrong {
        background-color: #ff5722;
      }

      ::content .fab.open {
        background-color: #FFC107;
      }
      
      ::content .fab.right {
        background-color: #0f9d58;
      }
      
      ::content .fab.next {
        background-color: #4285f4;
      }
      
      ::content .fab:active {
        box-shadow: 0 8px 17px 0 rgba(0, 0, 0, 0.2);
        transition-delay: 0s;
      }
      
      ::content .fab > core-icon {
        margin: 16px;
      }
      
      ::content .fab > core-icon::shadow path {
        fill: #fff;
      }
    </style>
    <content select="div"></content>
  </template>
  
  <script>

  Polymer({});


  </script>
</polymer-element>
