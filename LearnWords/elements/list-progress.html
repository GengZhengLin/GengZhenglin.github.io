<link rel="import" href="../bower_components/polymer/polymer.html">
<link rel="import" href="../bower_components/paper-progress/paper-progress.html">
<polymer-element name="list-progress">
  <template>
    <style>
      :host{
        position: relative;
        margin: 15px auto;
        margin-bottom: 0px;
        width: 640px;
        display: block;
      }
      ::content paper-progress{
        display: block;
        width: 100%;
        height: 10px;
      }
      ::content paper-progress::shadow #progressContainer{
        background-color: white;
        box-shadow: 2px 2px 2px rgba(0,0,0,0.3);
        border-radius: 5px;
      }

      ::content paper-progress::shadow #activeProgress{
        border-radius: 5px;
      }

      ::content span {
        float: right;
        font-size: 1.2rem;
        color: #848484;
      }

      div.clear-float{
        clear: both;
      }
    </style>
    <content select="span"></content>
    <div class="clear-float"></div>
    <content select="paper-progress"></content>
    
  </template>
  
  <script>

  Polymer({});


  </script>
</polymer-element>
